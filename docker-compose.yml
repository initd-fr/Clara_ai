# Clara AI — Stack (PostgreSQL, MinIO, Clara, Archibald)
# Un seul fichier .env à la racine (voir .env.exemple). Puis : ./start.sh

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: clara
      POSTGRES_PASSWORD: clara_secret
      POSTGRES_DB: clara
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db/01-pgvector.sql:/docker-entrypoint-initdb.d/01-pgvector.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clara -d clara"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  clara:
    build:
      context: ./clara-ai
      dockerfile: Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      minio: { condition: service_started }
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://clara:clara_secret@postgres:5432/clara
      MINIO_ENDPOINT: minio
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USESSL: "0"
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: production
    ports:
      - "3000:3000"
      - "3001:3001"

  archibald:
    build:
      context: ./archibald
      dockerfile: Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      minio: { condition: service_started }
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://clara:clara_secret@postgres:5432/clara
      MINIO_ENDPOINT: minio
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  minio_data:
